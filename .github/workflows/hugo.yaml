name: 发布 Hugo 网站到 GitHub Pages

on:
  # 在推送到默认分支时运行
  push:
    branches:
      - main

  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：只允许一个部署正在进行
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.0          # ← 更新到最新稳定版（2026 年 4 月）
      DART_SASS_VERSION: 1.99.0      # ← 推荐版本

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 设置 GitHub Pages
        id: pages
        uses: actions/configure-pages@v5   # ← 更新到 v5/v6

      - name: 安装 Hugo CLI (Extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: 安装 Dart Sass（推荐方式）
        run: |
          mkdir -p ${{ runner.temp }}/dart-sass
          curl -L -o ${{ runner.temp }}/dart-sass.tar.gz \
            https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz
          tar -xzf ${{ runner.temp }}/dart-sass.tar.gz -C ${{ runner.temp }}
          echo "${{ runner.temp }}/dart-sass" >> $GITHUB_PATH

      - name: 安装 Node.js 依赖（如果有）
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          fi

      - name: 使用 Hugo 构建
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3   # ← 推荐 v3（更稳定）
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5   # ← 已更新到 v5（这是你原脚本最需要改的地方）
  # ==================== QQ 邮箱通知 ====================
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send QQ Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          # 建议改用 465 端口配 secure: true，这是 QQ 邮箱最稳定的方式
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.QQ_EMAIL }}
          password: ${{ secrets.QQ_SMTP_AUTH }}
          subject: "【Hugo 博客】构建状态：${{ job.status }}"
          to: "Hugo-Deploy <${{ secrets.QQ_EMAIL }}>"
          from: "Hugo-Deploy <${{ secrets.QQ_EMAIL }}>"
          body: "Hugo 博客构建完成！状态: ${{ job.status }} | 仓库: ${{ github.repository }} | 详情: https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}"
          secure: true
          html_body: false
